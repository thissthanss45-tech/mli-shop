name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-lint-type:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run tests
        env:
          BOT_TOKEN: test-token
          OWNER_ID: "1"
          WEB_ADMIN_KEY: test-admin-key
          CORS_ORIGINS: https://example.com
        run: pytest

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        env:
          BOT_TOKEN: test-token
          OWNER_ID: "1"
          WEB_ADMIN_KEY: test-admin-key
          CORS_ORIGINS: https://example.com
        run: mypy --follow-imports=skip config.py web_api.py
