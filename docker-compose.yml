x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:15-alpine
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shop_password}
      POSTGRES_DB: ${POSTGRES_DB:-shop_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    logging: *default-logging
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mli_shop}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme_rabbitmq}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  bot:
    build: .
    restart: always
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-shop_user}:${POSTGRES_PASSWORD:-shop_password}@db/${POSTGRES_DB:-shop_db}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mli_shop}:${RABBITMQ_PASS:-changeme_rabbitmq}@rabbitmq:5672/
    command: sh -c "alembic -c /app/alembic.ini upgrade head && python shop.py"

  worker:
    build: .
    restart: always
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-shop_user}:${POSTGRES_PASSWORD:-shop_password}@db/${POSTGRES_DB:-shop_db}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mli_shop}:${RABBITMQ_PASS:-changeme_rabbitmq}@rabbitmq:5672/
    command: python worker.py

  web_api:
    build: .
    restart: always
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-shop_user}:${POSTGRES_PASSWORD:-shop_password}@db/${POSTGRES_DB:-shop_db}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mli_shop}:${RABBITMQ_PASS:-changeme_rabbitmq}@rabbitmq:5672/
    ports:
      - "0.0.0.0:${WEB_API_PORT:-8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: sh -c "alembic -c /app/alembic.ini upgrade head && WEB_API_PORT=8000 python web_api.py"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    logging: *default-logging
    depends_on:
      web_api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      TLS_DOMAIN: ${TLS_DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .disabled
    command: ["/bin/sh", "/opt/mli/render-nginx-config.sh"]
    volumes:
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - ./infra/nginx/render-nginx-config.sh:/opt/mli/render-nginx-config.sh:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    profiles: ["ops"]
    logging: *default-logging
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:
