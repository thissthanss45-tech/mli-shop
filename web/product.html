<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLI Shop — Товар</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <header class="header">
    <div class="container header__inner">
      <div>
        <p class="badge">MLI SHOP</p>
        <h1>Карточка товара</h1>
        <p class="subtitle">Детальная страница товара из базы PostgreSQL</p>
      </div>
      <div class="header-actions">
        <a class="docs-link" href="/admin">🛠 Админ</a>
        <a class="docs-link" href="/" rel="noreferrer">← В каталог</a>
        <a class="docs-link" href="/about">🏬 О магазине</a>
        <a class="docs-link" href="/ai-chat">✨ AI чат</a>
        <a class="cart-pill" href="/cart">🛒 Корзина</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="product-wrap" id="product-wrap">
      <p class="meta">Загрузка товара…</p>
    </section>
  </main>

  <script>
    function formatPrice(value) {
      return new Intl.NumberFormat('ru-RU').format(value) + ' ₽';
    }

    function readCart() {
      try {
        return JSON.parse(localStorage.getItem('mli_cart') || '[]');
      } catch {
        return [];
      }
    }

    function addToCart(item) {
      const cart = readCart();
      if (!cart.find((x) => x.id === item.id)) {
        cart.push({
          id: item.id,
          name: item.name,
          description: item.description,
          price: item.price,
          category_id: item.category_id,
          category_name: item.category_name,
          brand_id: item.brand_id,
          brand_name: item.brand_name,
          image_url: item.image_url,
          primary_media_url: item.primary_media_url,
          primary_media_type: item.primary_media_type,
          media: item.media || [],
        });
        localStorage.setItem('mli_cart', JSON.stringify(cart));
      }
    }

    function renderMediaItem(media, className = 'card__image card__image--detail') {
      if (!media || !media.url) {
        return `<img class="${className}" src="/web/no-image.svg" alt="Нет медиа" loading="lazy" />`;
      }
      if (media.media_type === 'video') {
        return `<video class="${className}" src="${media.url}" controls playsinline preload="metadata"></video>`;
      }
      return `<img class="${className}" src="${media.url}" alt="Фото товара" loading="lazy" />`;
    }

    function getProductIdFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const id = Number(parts[parts.length - 1]);
      return Number.isFinite(id) && id > 0 ? id : null;
    }

    function renderNotFound(message) {
      const wrap = document.getElementById('product-wrap');
      wrap.innerHTML = `<div class="card"><p class="empty">${message}</p></div>`;
    }

    function renderProduct(item) {
      const wrap = document.getElementById('product-wrap');
      const media = Array.isArray(item.media) ? item.media : [];
      const primary = media.find((entry) => entry.is_primary) || media[0] || null;
      const gallery = media.length > 1
        ? `<div class="media-strip">${media.map((entry, index) => `<button class="media-thumb ${entry.is_primary ? 'media-thumb--active' : ''}" type="button" data-media-index="${index}">${entry.media_type === 'video' ? 'Видео' : 'Фото'} ${index + 1}</button>`).join('')}</div>`
        : '';
      wrap.innerHTML = `
        <article class="card card--product">
          <div id="product-media">${renderMediaItem(primary)}</div>
          ${gallery}
          <div class="card__top">
            <h2 class="card__title">${item.name}</h2>
            <span class="card__price">${formatPrice(item.price)}</span>
          </div>
          <p class="card__desc">${item.description || 'Описание не указано'}</p>
          <div class="card__tags">
            <span class="tag">ID: ${item.id}</span>
            <span class="tag">${item.category_name ? `Категория: ${item.category_name}` : `Категория #${item.category_id}`}</span>
            <span class="tag">${item.brand_name ? `Бренд: ${item.brand_name}` : `Бренд #${item.brand_id ?? '—'}`}</span>
            <span class="tag">В наличии: ${item.stock}</span>
          </div>
          <div class="product-actions">
            <button class="card__buy" id="buy-btn" type="button">Купить</button>
            <a class="card__more" href="/">Вернуться в каталог</a>
            <a class="card__more card__more--ghost" href="/docs" target="_blank" rel="noreferrer">Открыть API Docs</a>
          </div>
        </article>
      `;

      wrap.querySelectorAll('[data-media-index]').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.mediaIndex);
          const current = media[index] || primary;
          wrap.querySelector('#product-media').innerHTML = renderMediaItem(current);
          wrap.querySelectorAll('.media-thumb').forEach((thumb) => thumb.classList.remove('media-thumb--active'));
          button.classList.add('media-thumb--active');
        });
      });

      wrap.querySelector('#buy-btn').addEventListener('click', () => {
        addToCart(item);
        wrap.querySelector('#buy-btn').textContent = 'Добавлено ✓';
      });
    }

    async function loadProduct() {
      const productId = getProductIdFromPath();
      if (!productId) {
        renderNotFound('Некорректный идентификатор товара.');
        return;
      }

      try {
        const res = await fetch(`/api/products/${productId}`);
        if (res.status === 404) {
          renderNotFound('Товар не найден.');
          return;
        }
        if (!res.ok) {
          renderNotFound('Ошибка загрузки товара. Попробуйте позже.');
          return;
        }
        const data = await res.json();
        renderProduct(data);
      } catch (error) {
        renderNotFound('Сервис временно недоступен.');
      }
    }

    loadProduct();
  </script>
</body>
</html>
